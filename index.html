<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Shower - Invitación</title>
    <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="invitacion-container">

        <div class="decoracion-ciguena">
            <img src="assets/images/ciguena.png" alt="Cigüeña" class="ciguena">
        </div>

        <header class="header">
            <h1 class="titulo-mixto">
                <span class="nina">¿Niña</span> <span class="o">o</span> <span class="nino">Niño?</span>
            </h1>
            <p class="subtitulo"> Les hacemos la invitación a descubrir el género de nuestro bebé!</p>
        </header>

        <section class="info">
            <div class="fecha">
                <p>MARZO</p>
                <span class="dia">22</span>
            </div>
            <div class="detalles">
                <p>16:00 hrs.</p>
                <p>Agenda este dia tan importante para nosotros</p>
                <p>Priv. Xaltonac 423, col. Indios Verdes</p>
            </div>
        </section>

        <div class="acciones">
            <a href="https://maps.app.goo.gl/oURhebaHK8TjDUJY9" target="_blank" class="btn-ubicacion">Ver Ubicación 📍</a>
            <button id="btn-reproducir" class="btn-musica">Poner Música 🎵</button>
        </div>

        <section class="rsvp">
            <h3>Por Favor, Confirmar Asistencia</h3>
            <form id="form-registro">
                <input type="text" name="nombre" placeholder="Tu Nombre" required>
                <select name="asistencia">
                    <option value="si">¡Ahí estaré!</option>
                    <option value="no">No podré ir</option>
                </select>
                <button type="submit" id="submit-btn">Enviar Confirmación</button>
            </form>
        </section>

     <div class="decoracion-ositos">
            <img src="assets/images/azul.png" alt="Osito Azul" class="osito osito-izquierda">
            <img src="assets/images/rosa.png" alt="Osito Rosa" class="osito osito-derecha">
        </div>
    </div>

    <audio id="musica-fondo" loop>
        <source src="assets/music/cancion.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
